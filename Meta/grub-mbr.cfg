timeout=1

menuentry 'SerenityOS (normal)' {
  root=hd0,1
  multiboot /boot/Kernel root="block100:8"
}

menuentry 'SerenityOS (text mode)' {
  root=hd0,1
  multiboot /boot/Kernel graphics_subsystem_mode=off root="block100:8"
}

menuentry 'SerenityOS (No ACPI)' {
  root=hd0,1
  multiboot /boot/Kernel root="block100:8" acpi=off
}

menuentry 'SerenityOS (with serial debug)' {
  root=hd0,1
  multiboot /boot/Kernel serial_debug root="block100:8"
}
